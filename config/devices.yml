# Per-device hardware configuration
# Supports: Mac (Apple Silicon), Windows (NVIDIA GPU), or shared Ollama endpoint.
# All three interoperable; each independently configurable.

devices:
  mac-studio:
    os: macos
    chip: apple-silicon
    runtimes:
      - ollama         # GLM-5.1:cloud via local Ollama client
      - lm-studio      # local verifier / orchestrator fallback
      - mlx            # Mac-only legacy local path
    default_backend: ollama
    notes: >
      Primary Mac device. Prefer GLM-5.1:cloud through local Ollama for thin orchestration.
      Fall back to Mac LM Studio when GLM is offline or rate-limited; MLX remains legacy local fallback.

  win-rtx3080:
    os: windows
    gpu: rtx-3080
    runtimes:
      - lm-studio      # canonical Windows heavy coder / autoresearch backend
      - ollama         # fallback coder / critic lane
    default_backend: lm-studio
    notes: >
      Primary Windows device. LM Studio is the canonical heavy coder/executor/autoresearch lane.
      Ollama remains available for qwen3-coder and critic fallbacks.

  shared-ollama-host:
    os: mixed
    runtimes:
      - ollama
    notes: >
      Optional dedicated Ollama server (local network or same machine).
      Set OLLAMA_HOST=http://<ip>:11434 in .env on both Mac and Win.
