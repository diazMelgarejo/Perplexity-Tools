# Hardware Device Profiles (v0.9.9.8)
# Per-device hardware configuration defined in config/devices.yml
# Supports: Mac (Apple Silicon), Windows (NVIDIA GPU), or shared Ollama endpoint.
#
# HARDWARE POLICY (enshrined 2026-05-17 — see docs/LESSONS.md):
# - Mac inference ALWAYS via Ollama (localhost:11434). MLX still allowed for benchmarks.
# - LM Studio Mac (localhost:1234) is a MIRROR ONLY — it proxies Win models over LAN
#   but Mac hardware CANNOT run them (qwen3.5-27b is RTX 3080-only).
# - Dispatching the same heavy model to both Mac LM Studio AND Win LM Studio
#   simultaneously = "double barrel" = GPU contention → hardware damage risk.
# - Win RTX 3080 (192.168.254.103:1234) exclusively runs heavy Win-native models.
# - Code enforcement: _MIRROR_BACKENDS in perpetua/discovery/selector.py.

version: "0.9.9.8"

devices:
  - id: "mac-studio"
    os: macos
    chip: apple-silicon
    runtimes:
      - ollama         # PRIMARY: shared with Windows if OLLAMA_HOST set in .env
      - mlx            # Mac-only; mlx-lm serve on port 8081 (benchmark / future)
      - lm-studio      # MIRROR ONLY — discovery sees it; selector excludes from dispatch
    default_backend: ollama
    primary_backend: "ollama"
    # secondary_backend removed: LM Studio Mac is mirror-only per hardware policy
    lan_ip: "localhost"
    ports:
      - 11434  # Ollama (PRIMARY — inference)
      - 8081   # MLX (optional, native Mac performance benchmarks)
      - 1234   # LM Studio Mac (MIRROR ONLY — discovery sees this but selector excludes)
    identity_method: "static_subnet"
    description: "Mac Studio: Ollama-only for inference per hardware policy"
    notes: >
      Primary Mac device. Inference ALWAYS routes to Ollama (localhost:11434).
      LM Studio Mac is a MIRROR ONLY — it appears in discovery for visibility but
      the selector hard-excludes it from dispatch (_MIRROR_BACKENDS frozenset).

  - id: "win-rtx3080"
    os: windows
    gpu: rtx-3080
    runtimes:
      - lm-studio      # PRIMARY: exclusive runner for qwen3.5-27b heavy reasoning
      - ollama         # secondary fallback
    default_backend: "lm-studio"
    primary_backend: "lm-studio"
    secondary_backend: "ollama"
    lan_ip: "192.168.254.103"
    ports:
      - 1234   # LM Studio (PRIMARY — heavy reasoning models)
      - 11434  # Ollama (secondary)
    identity_method: "active_tilting"
    description: "Windows RTX 3080: LM Studio primary, Ollama secondary"
    active_tilting_required: true
    notes: >
      Primary Windows device. Exclusive runner for qwen3.5-27b-claude-4.6-opus-
      reasoning-distilled-v2 (RTX 3080 GGUF). Mac LM Studio mirrors this model
      but selector excludes mirror from dispatch — see hardware policy above.

  - id: "shared-ollama"
    os: mixed
    runtimes:
      - ollama
    primary_backend: "ollama"
    lan_ip: ""              # set this only if you have a dedicated Ollama server
    ports:
      - 11434
    identity_method: "environment_variable"
    description: "Optional dedicated Ollama instance (separate machine)"
    notes: >
      Optional dedicated Ollama server (separate from Mac+Win primary devices).
      Set OLLAMA_HOST=http://<ip>:11434 in .env if you run one.
      LEAVE lan_ip EMPTY if you don't — do NOT reuse Win RTX 3080 IP (.103).

  - id: "cloud"
    primary_backend: "https_api"
    lan_ip: "internet"
    ports:
      - 443
    identity_method: "api_key"
    description: "Cloud providers via HTTPS API"
