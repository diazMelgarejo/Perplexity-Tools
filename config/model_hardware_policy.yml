# Perpetua-Tools/config/model_hardware_policy.yml
# SINGLE SOURCE OF TRUTH — all enforcement reads this file
#
# ── HARDWARE POLICY (HARD ENFORCEMENT — enshrined 2026-05-17) ────────────────
# windows_only: models that physically run ONLY on Win RTX 3080. Dispatching
#   them anywhere else = OOM, missing CUDA kernel, or "double barrel" GPU damage
#   (when Mac LM Studio mirror proxies the model AND Win dispatches it concurrently).
#
# mac_only:     models that physically run ONLY on Mac Apple Silicon (e.g. MLX
#   quantizations with no GGUF/CUDA equivalent). Currently empty — all MLX models
#   have GGUF mirrors usable on Win.
#
# shared:       models that run NATIVELY on both machines (either machine can be
#   the physical home). Routing chooses per task_type / target_tier.
#
# Code enforcement: perpetua/discovery/selector.py uses _MIRROR_BACKENDS to hard-
#   exclude lmstudio-mac (localhost:1234) from dispatch — it appears in /v1/models
#   as a LAN proxy but the Mac hardware cannot run heavy Win-native models.
#
# ── LM Studio proxy gotcha (discovered 2026-04-29) ───────────────────────────
# LM Studio proxies all configured remote LAN endpoints' models as "local".
# This means Mac's /v1/models returns Win models AND vice versa.
# You CANNOT determine a model's physical hardware by which endpoint lists it.
# The policy below uses PROVIDER NAME (lmstudio-mac / lmstudio-win) as the
# routing key, enforced by selector.py's _TIER_HOSTS + _MIRROR_BACKENDS.
#
# ── Anti-mirror dispatch rule (2026-05-23) ───────────────────────────────────
# NEVER POST model="" to lmstudio-mac (or any inference worker). An empty model
# lets LM Studio use whatever is *loaded* locally — often a windows_only LAN proxy.
# All dispatch paths MUST set an explicit model id via utils.dispatch_models
# (default for lmstudio-mac: Qwen3.5-9B-MLX-4bit / MAC_LMS_MODEL). Enforcement:
# orchestrator/supervisor.py, orchestrator/worker_registry.py, agent_launcher.py.
#
# ── v1.2+ note ───────────────────────────────────────────────────────────────
# When RTX 5080 arrives: add affinity "win-rtx5080" alongside "win-rtx3080"
# in agent_registry.json. Update this file if that machine gets exclusive models.
# ─────────────────────────────────────────────────────────────────────────────

mac_only: []

# HARD POLICY: these models MUST dispatch to lmstudio-win (192.168.254.103:1234).
# Selector will refuse to route them to lmstudio-mac (mirror) or anywhere else.
windows_only:
  - qwen3.5-27b-claude-4.6-opus-reasoning-distilled-v2    # RTX 3080 GGUF — heavy reasoning
  - gemma-4-26b-a4b-it                                    # RTX 3080 GGUF — large model

# These models run natively on both machines (or are small enough for either).
shared:
  - qwen3.5-9b-mlx                                        # native: Mac MLX | proxied: Win
  - gemma-4-e4b-it                                        # native: both confirmed
  - text-embedding-nomic-embed-text-v1.5                  # native: both confirmed

# Case-insensitive aliases (LM Studio sometimes capitalises model IDs)
shared_aliases:
  - Qwen3.5-9B-MLX-4bit
  - qwen3.5-9b-mlx-4bit

# Aliases for windows_only models (preserve hard enforcement under different casing)
windows_only_aliases:
  - Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
  - gemma-4-26B-A4B-it-Q4_K_M
