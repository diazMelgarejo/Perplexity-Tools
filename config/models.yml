# Model registry — per-device and per-backend configuration.
# Top-level agents (Mac + Win) select via SKILL.md → ModelRegistry first.
# Subagents use ECC-tools default logic unless parent overrides role assignment.
# priority: lower number = preferred. Local models before online models.

models:

  # ── LOCAL: Shared Ollama (Mac or Win or dedicated server) ─────────────────
  - name: qwen3.5:35b-a3b-q4_K_M
    backend: ollama
    device: shared-ollama-host
    host: "${OLLAMA_HOST:-http://127.0.0.1}"
    port: 11434
    context_window: 32768
    roles: [general, critic, refiner, fallback, subagent]
    priority: 10
    online: false
    reasoning: local-default

  # ── LOCAL: Mac MLX ────────────────────────────────────────────────────────
  - name: qwen3.5-9b-mlx
    backend: mlx
    device: mac-studio
    host: "http://127.0.0.1"
    port: 8081
    context_window: 32768
    roles: [general, top-level, coding, subagent]
    priority: 20
    online: false
    reasoning: mac-local

  # ── LOCAL: Windows LM Studio ─────────────────────────────────────────────
  # [v1.0 RC] Win agent — Qwen3.5-27B Q4_K_M via LM Studio (GPU Offload=40, context=16384)
  # GGUF file is backend-agnostic: also loads in Ollama, koboldcpp, llama.cpp
  - name: Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2
    backend: lm-studio
    device: win-rtx3080
    host: "${LM_STUDIO_WIN_ENDPOINT:-http://192.168.1.100}"
    port: 1234
    context_window: 16384
    roles: [coder, checker, refiner, executor, verifier, subagent, fallback]
    priority: 15
    online: false
    reasoning: windows-ultrathink-agent
    notes: "v1.0 RC Win UltraThink Agent. HF: bartowski/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF"

  # [v1.0 RC] Mac orchestrator — Qwen3.5-9B MLX 4bit via LM Studio (Metal full offload, context=4096)
  # MLX format — also loads as GGUF in Ollama or llama.cpp if needed
  - name: Qwen3.5-9B-MLX-4bit
    backend: lm-studio
    device: mac-studio
    host: "${LM_STUDIO_MAC_ENDPOINT:-http://localhost}"
    port: 1234
    context_window: 4096
    roles: [orchestrator, final-validator, presenter, top-level]
    priority: 10
    online: false
    reasoning: mac-orchestrator
    notes: "v1.0 RC Mac Orchestrator+Validator. Context=4096 conservative for M2 16GB."

  # [planned — future release] qwen3.5-35b-a3b-lmstudio (Win LM Studio, context=32768)
  # Uncomment when upgrading Win agent to 35B or higher VRAM config
  # - name: qwen3.5-35b-a3b-lmstudio
  #   backend: lm-studio
  #   device: win-rtx3080
  #   host: "http://127.0.0.1"
  #   port: 1234
  #   context_window: 32768
  #   roles: [general, coding, subagent, fallback]
  #   priority: 30
  #   online: false
  #   reasoning: windows-local

  # ── ONLINE: Perplexity sonar-reasoning-pro ───────────────────────────────
  - name: sonar-reasoning-pro
    backend: perplexity
    device: cloud
    host: "https://api.perplexity.ai"
    port: 443
    context_window: 128000
    roles: [research, top-level, realtime]
    priority: 40
    online: true
    reasoning: online-research

  # ── ONLINE: Claude 4.5 Thinking ──────────────────────────────────────────
  - name: claude-4-5-thinking
    backend: anthropic
    device: cloud
    host: "https://api.anthropic.com"
    port: 443
    context_window: 200000
    roles: [strategy, architecture, top-level]
    priority: 50
    online: true
    reasoning: high-depth

  # ── ONLINE: Grok 4.1 Thinking ────────────────────────────────────────────
  - name: grok-4-1-thinking
    backend: xai
    device: cloud
    host: "https://api.x.ai"
    port: 443
    context_window: 131072
    roles: [finance, realtime, market, top-level]
    priority: 60
    online: true
    reasoning: realtime-specialist


  # ── AUTORESEARCH: foot-soldier agents (karpathy/autoresearch swarm) ───────────
  # autoresearch-coder: Qwen3-Coder-14B on Windows RTX 3080 (CUDA executor)
  # autoresearch-critic: Qwen3-30B on Dell (evaluator + orchestrator reasoning)
  # Both are LOCAL-only; never route autoresearch tasks to cloud without explicit override.

  - name: qwen3-coder-14b
    backend: ollama
    device: win-rtx3080
    host: "${DELL_ENDPOINT:-http://192.168.1.100}"
    port: 11434
    context_window: 32768
    roles: [autoresearch-coder, coding, subagent, fallback]
    priority: 5
    online: false
    reasoning: windows-local-coder
    notes: "Coder agent for autoresearch swarm. Edits train.py on Mac, deploys via scp."

  - name: qwen3-30b-autoresearch-critic
    backend: ollama
    device: win-rtx3080
    host: "${DELL_ENDPOINT:-http://192.168.1.100}"
    port: 11434
    context_window: 32768
    roles: [autoresearch-critic, critic, refiner, strategy, fallback]
    priority: 6
    online: false
    reasoning: windows-local-critic
    notes: "Evaluator + Orchestrator agents for autoresearch swarm. Reads log.txt, writes swarm_state.md."
