# Model registry — per-device and per-backend configuration.
# Top-level agents (Mac + Win) select via SKILL.md → ModelRegistry first.
# Subagents use ECC-tools default logic unless parent overrides role assignment.
# priority: lower number = preferred. Local models before online models.

version: "0.9.9.6"

models:

  # ── Priority 1 - Top Orchestrator on Mac ──────────────────────────────────
  - name: "glm-5.1:cloud"
    backend: ollama
    device: mac-studio
    host: "${OLLAMA_HOST:-http://127.0.0.1}"
    port: 11434
    priority: 1
    online: true
    status: "🟢 Primary"
    roles:
      - "top-level"
      - "long_context"
      - "strategy"
      - "general"
    description: "Top Orchestrator - Cloud-Local Hybrid"
    tier: "primary" 

  # ── Priority 05 - LOCAL: Windows LM Studio (v1.0 RC canonical) ────────────
  # Qwen3.5-27B Q4_K_M — GPU Offload=40, Context=16384
  # HF: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF
  # Same .gguf loadable in Ollama, koboldcpp, llama.cpp — backend-agnostic
  - name: "Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2"
    backend: lm-studio
    device: win-rtx3080
    host: "${LM_STUDIO_WIN_ENDPOINTS:-http://://192.168.254.103://192.168.254.103://192.168.254.103://192.168.254.101}"
    port: 1234
    context_window: 16384
    gpu_offload: 40
    roles: [coding, checker, refiner, executor, verifier, subagent, autoresearch-coder, autoresearch, fallback]
    priority: 5
    online: false
    reasoning: windows-lmstudio
    gguf_file: Qwen3.5-27B.Q4_K_M.gguf
    hf_repo: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF
    description: "Primary Logic, Heavy Coder, Critic, Evaluator"
    tier: "primary"

  # ── Priority 10 - LOCAL: Mac LM Studio (v1.0 RC canonical) ────────────────
  # Qwen3.5-9B MLX-4bit — Metal full GPU offload, Context=4096 (conservative M2 16GB)
  # HF: mlx-community/Qwen3.5-9B-MLX-4bit
  # Same weights loadable in Ollama (mlx-lm backend)
  - name: Qwen3.5-9B-MLX-4bit
    backend: lm-studio
    device: mac-studio
    host: "${LM_STUDIO_MAC_ENDPOINT:-http://localhost:1234}"
    port: 1234
    context_window: 4096
    gpu_offload: full
    roles: [mac_orchestrator, refiner, verifier, final-validator, presenter, top-level]
    priority: 10
    status: "🔵 Preferred Fallback"
    online: false
    reasoning: mac-lmstudio
    hf_repo: mlx-community/Qwen3.5-9B-MLX-4bit
    description: "Mac Orchestrator, Refiner, Verifier"
    tier: "preferred_fallback"
 
  # ── LOCAL: Windows LM Studio — Gemma 4 26B A4B (MoE) ─────────────────────
  # lmstudio-community/gemma-4-26B-A4B-it-GGUF Q4_K_M ≈ 16.8 GB
  # MoE: 4B active params — lower VRAM pressure than dense 26B
  # XPS 8950 + RTX 3080 10GB: gpu_offload=35 → ~9.5 GB VRAM, rest on 32 GB CPU RAM
  - name: gemma-4-26B-A4B-it-Q4_K_M
    backend: lm-studio
    device: win-rtx3080
    host: "${LM_STUDIO_WIN_ENDPOINTS:-http://://192.168.254.103://192.168.254.103://192.168.254.103://192.168.254.101}"
    port: 1234
    context_window: 16384
    gpu_offload: 35
    roles: [general, coding, executor, subagent, fallback, autoresearch-coder]
    priority: 16
    online: false
    reasoning: windows-lmstudio-gemma4
    gguf_file: gemma-4-26B-A4B-it-Q4_K_M.gguf
    hf_repo: lmstudio-community/gemma-4-26B-A4B-it-GGUF
    notes: "LM Studio community build — optimized for LM Studio, seamless load."

   # ── LOCAL: Shared Ollama (Mac or Win or dedicated server) ─────────────────
  - name: qwen3.5:35b-a3b-q4_K_M
    backend: ollama
    device: shared-ollama
    host: "${OLLAMA_HOST:-http://127.0.0.1}"
    port: 11434
    context_window: 32768
    roles: [general, critic, refiner, fallback, subagent]
    priority: 10
    online: false
    reasoning: local-default

  # ── LOCAL: Mac MLX ────────────────────────────────────────────────────────
  - name: qwen3.5-9b-mlx
    backend: mlx
    device: mac-studio
    host: "http://127.0.0.1"
    port: 8081
    context_window: 32768
    roles: [general, top-level, coding, subagent]
    priority: 20
    online: false
    reasoning: mac-local

 # ── ONLINE: Perplexity sonar-reasoning-pro ───────────────────────────────
  - name: sonar-reasoning-pro
    backend: perplexity
    device: cloud
    host: "https://api.perplexity.ai"
    port: 443
    context_window: 128000
    roles: [research, top-level, realtime]
    priority: 40
    online: true
    reasoning: online-research

  # ── ONLINE: Claude 4.5 Thinking ──────────────────────────────────────────
  - name: claude-4-5-thinking
    backend: anthropic
    device: cloud
    host: "https://api.anthropic.com"
    port: 443
    context_window: 200000
    roles: [strategy, architecture, top-level]
    priority: 50
    online: true
    reasoning: high-depth

  # ── ONLINE: Grok 4.1 Thinking ────────────────────────────────────────────
  - name: grok-4-1-thinking
    backend: xai
    device: cloud
    host: "https://api.x.ai"
    port: 443
    context_window: 131072
    roles: [finance, realtime, market, top-level]
    priority: 60
    online: true
    reasoning: realtime-specialist


  # ── AUTORESEARCH: foot-soldier agents (uditgoenka/autoresearch swarm) ───────────
  # autoresearch-coder: Qwen3-Coder-14B on Windows RTX 3080 (CUDA executor)
  # autoresearch-critic: Qwen3-30B on Dell (evaluator + orchestrator reasoning)
  # Both are LOCAL-only; never route autoresearch tasks to cloud without explicit override.

  - name: qwen3-30b-autoresearch-critic
    backend: ollama
    device: win-rtx3080
    host: "${WIN_ENDPOINT:-http://192.168.254.101}"
    port: 11434
    context_window: 32768
    roles: [autoresearch-critic, critic, refiner, strategy, fallback]
    priority: 15
    online: false
    reasoning: windows-local-critic
    notes: "Evaluator + Orchestrator agents for autoresearch swarm. Reads log.txt, writes swarm_state.md."
