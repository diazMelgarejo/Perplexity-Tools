# Routing rules — maps task_type → ordered role list for ModelRegistry.route_task().
# First matching model per role wins; fallback roles provide the chain.
# Top-level agents on Mac+Win use this. Subagents use ECC default unless overridden.
routes:

  default:
    description: General-purpose tasks
    roles: [top-level, mac_orchestrator, general, fallback]

  coding:
    description: Code generation, review, debugging
    roles: [coding, top-level, fallback]

  strategy:
    description: Architecture, planning, system design
    roles: [strategy, architecture, mac_orchestrator, top-level, fallback]

  finance:
    description: Financial analysis, market data, real-time queries
    roles: [finance, realtime, market, fallback]

  research:
    description: Web research, synthesis, long-context analysis
    roles: [research, long_context, top-level, fallback]

  critic:
    description: Refinement, quality review, elegance scoring
    roles: [critic, refiner, fallback]

  subagent:
    description: Subagent tasks delegated by top-level orchestrator
    roles: [subagent, general, fallback]

  realtime:
    description: Live data, current events, monitoring
    roles: [realtime, market, research, fallback]

  # ── ULTRATHINK: local-only ultrathink routes via task_type selection ────────
  # PT selects task_type=deep_reasoning or task_type=code_analysis for these.
  # `reasoning_depth` belongs to the optional HTTP backup path, not OrchestrateRequest.
  # `privacy_critical` is not a live PT request field; privacy is enforced here
  # by requiring ultrathink_available and by excluding cloud/online model roles.
  # ultrathink is stateless — PT owns dedup via .state/agents.json.
  # Fallback: local qwen3:30b if ultrathink endpoint unreachable.
  deep_reasoning:
    description: Complex multi-step reasoning, privacy-critical tasks
    endpoint: "${ULTRATHINK_ENDPOINT}"
    timeout: "${ULTRATHINK_TIMEOUT}"
    requires: [ultrathink_available]
    fallback: local_qwen30b
    roles: [ultrathink, strategy, top-level, fallback]

  code_analysis:
    description: Deep code analysis requiring extended reasoning
    endpoint: "${ULTRATHINK_ENDPOINT}"
    timeout: "${ULTRATHINK_TIMEOUT}"
    requires: [ultrathink_available]
    model: qwen3-coder:14b
    fallback: local_qwen30b
    roles: [ultrathink, coding, top-level, fallback]

  # ── AUTORESEARCH: uditgoenka/autoresearch foot-soldier swarm ─────────────────
  # Called by orchestrator/autoresearch_bridge.py only.
  # Coder runs on win-rtx3080 (CUDA); Evaluator + Orchestrator run on mac.
  autoresearch:
    description: ML experiment loop via uditgoenka/autoresearch on GPU runner
    roles: [autoresearch-coder, autoresearch, autoresearch-critic, strategy, fallback]
    notes: sync_autoresearch_idempotent() must succeed before any agent spawns

  autoresearch-coder:
    description: Edits train.py, deploys to GPU via scp, dispatches run via ssh
    roles: [autoresearch-coder, coding, fallback]
    device_affinity: win-rtx3080

  autoresearch-evaluator:
    description: Reads log.txt, parses val_bpb, writes findings to swarm_state.md
    roles: [autoresearch-critic, critic, refiner, fallback]
    device_affinity: mac

  autoresearch-orchestrator:
    description: Reads swarm_state.md + git log, proposes next hypothesis
    roles: [strategy, architecture, top-level, fallback]
    device_affinity: mac

  ml-experiment:
    description: Alias for autoresearch; routes identically
    roles: [autoresearch-coder, autoresearch-critic, strategy, fallback]
